<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>PÁD DONJONU – Skládací kostky D6</title>
    <style>
        @page { size: A4; margin: 10mm; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 12mm 10mm 10mm;
            background: #f5f0e8;
            text-align: center;
            -webkit-print-color-adjust: exact; print-color-adjust: exact;
        }
        h1 {
            font-size: 13pt; color: #1a1008; letter-spacing: 3pt;
            text-transform: uppercase; margin: 0 0 1mm;
        }
        .instructions {
            font-size: 8pt; color: #5a4a30; margin-bottom: 3mm; line-height: 1.4;
        }
        .instructions strong { color: #8b1a1a; }
        .color-label {
            font-size: 10pt; font-weight: bold; letter-spacing: 2pt;
            text-transform: uppercase; margin: 0 0 2mm;
        }
        .color-label.red { color: #bb2222; }
        .color-label.blue { color: #2244aa; }
        .dice-grid {
            display: flex; flex-direction: column;
            align-items: center; gap: 2mm;
        }
        .die-svg { width: 100mm; height: auto; }
        .page-two { page-break-before: always; padding-top: 8mm; }
        .legend {
            margin-top: 3mm; font-size: 7.5pt; color: #5a4a30;
            display: flex; justify-content: center; gap: 12mm; align-items: center;
        }
        .legend-item { display: flex; align-items: center; gap: 2mm; }
        @media print {
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

<!-- ═══════ HIDDEN SVG — reusable die net template ═══════ -->
<!--
    Cross net layout (face = 25mm, tab = 5mm):
              [2]
        [3] [1] [4] [6]
              [5]

    Opposite faces sum to 7: 1↔6, 2↔5, 3↔4

    Face positions:
      Face 3: (0,30)    Face 1: (25,30)   Face 4: (50,30)   Face 6: (75,30)
      Face 2: (25,5)    Face 5: (25,55)

    7 glue tabs on free edges
    5 fold lines on shared edges
-->
<svg style="position:absolute;width:0;height:0;overflow:hidden" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <g id="d6-net">
            <!-- FACE BACKGROUNDS (currentColor inherited from <use> color) -->
            <rect x="0"  y="30" width="25" height="25" fill="currentColor" stroke="#1a1008" stroke-width="0.35"/>
            <rect x="25" y="30" width="25" height="25" fill="currentColor" stroke="#1a1008" stroke-width="0.35"/>
            <rect x="50" y="30" width="25" height="25" fill="currentColor" stroke="#1a1008" stroke-width="0.35"/>
            <rect x="75" y="30" width="25" height="25" fill="currentColor" stroke="#1a1008" stroke-width="0.35"/>
            <rect x="25" y="5"  width="25" height="25" fill="currentColor" stroke="#1a1008" stroke-width="0.35"/>
            <rect x="25" y="55" width="25" height="25" fill="currentColor" stroke="#1a1008" stroke-width="0.35"/>

            <!-- 7 GLUE TABS -->
            <g fill="#e8ddd0" stroke="#1a1008" stroke-width="0.25">
                <!-- Tab 1: face2 TOP → glues to face6 -->
                <polygon points="28,5 30,0 45,0 47,5"/>
                <!-- Tab 2: face2 LEFT → glues to face3 top -->
                <polygon points="25,8 20,10 20,27 25,29"/>
                <!-- Tab 3: face2 RIGHT → glues to face4 top -->
                <polygon points="50,8 55,10 55,27 50,29"/>
                <!-- Tab 4: face5 BOTTOM → glues to face6 -->
                <polygon points="28,80 30,85 45,85 47,80"/>
                <!-- Tab 5: face5 LEFT → glues to face3 bottom -->
                <polygon points="25,58 20,60 20,77 25,79"/>
                <!-- Tab 6: face5 RIGHT → glues to face4 bottom -->
                <polygon points="50,58 55,60 55,77 50,79"/>
                <!-- Tab 7: face6 RIGHT → glues to face3 side -->
                <polygon points="100,33 105,35 105,52 100,54"/>
            </g>

            <!-- FOLD LINES (dashed, on shared face edges) -->
            <g stroke="#1a1008" stroke-width="0.25" stroke-dasharray="1.5,1" fill="none">
                <line x1="25" y1="30" x2="50" y2="30"/>
                <line x1="25" y1="55" x2="50" y2="55"/>
                <line x1="25" y1="30" x2="25" y2="55"/>
                <line x1="50" y1="30" x2="50" y2="55"/>
                <line x1="75" y1="30" x2="75" y2="55"/>
            </g>

            <!-- CUT LINE (outer contour, clockwise) -->
            <path fill="none" stroke="#1a1008" stroke-width="0.5" stroke-linejoin="round" d="
                M 30,0 L 45,0 L 47,5 L 50,5 L 50,8
                L 55,10 L 55,27 L 50,29 L 50,30
                L 75,30 L 100,30 L 100,33
                L 105,35 L 105,52 L 100,54 L 100,55
                L 75,55 L 50,55 L 50,58
                L 55,60 L 55,77 L 50,79 L 50,80 L 47,80
                L 45,85 L 30,85 L 28,80 L 25,80 L 25,79
                L 20,77 L 20,60 L 25,58 L 25,55
                L 0,55 L 0,30 L 25,30
                L 25,29 L 20,27 L 20,10 L 25,8 L 25,5 L 28,5
                L 30,0 Z
            "/>

            <!-- PIPS (cream dots) -->
            <g fill="#f0e8d0" stroke="#c8b888" stroke-width="0.2">
                <!-- Face 1 (center 37.5, 42.5): 1 pip -->
                <circle cx="37.5" cy="42.5" r="2.2"/>

                <!-- Face 2 (center 37.5, 17.5): 2 pips diagonal -->
                <circle cx="32" cy="12" r="2.2"/>
                <circle cx="43" cy="23" r="2.2"/>

                <!-- Face 3 (center 12.5, 42.5): 3 pips diagonal -->
                <circle cx="7"    cy="37"   r="2.2"/>
                <circle cx="12.5" cy="42.5" r="2.2"/>
                <circle cx="18"   cy="48"   r="2.2"/>

                <!-- Face 4 (center 62.5, 42.5): 4 pips corners -->
                <circle cx="57" cy="37" r="2.2"/>
                <circle cx="68" cy="37" r="2.2"/>
                <circle cx="57" cy="48" r="2.2"/>
                <circle cx="68" cy="48" r="2.2"/>

                <!-- Face 5 (center 37.5, 67.5): 5 pips (corners + center) -->
                <circle cx="32"   cy="62"   r="2.2"/>
                <circle cx="43"   cy="62"   r="2.2"/>
                <circle cx="37.5" cy="67.5" r="2.2"/>
                <circle cx="32"   cy="73"   r="2.2"/>
                <circle cx="43"   cy="73"   r="2.2"/>

                <!-- Face 6 (center 87.5, 42.5): 6 pips (2 sloupce po 3) -->
                <circle cx="82.5" cy="36"   r="2.2"/>
                <circle cx="82.5" cy="42.5" r="2.2"/>
                <circle cx="82.5" cy="49"   r="2.2"/>
                <circle cx="92.5" cy="36"   r="2.2"/>
                <circle cx="92.5" cy="42.5" r="2.2"/>
                <circle cx="92.5" cy="49"   r="2.2"/>
            </g>
        </g>
    </defs>
</svg>


<!-- ═══════ PAGE 1 — ČERVENÝ HRÁČ ═══════ -->
<h1>✂ Skládací kostky D6</h1>
<p class="instructions">
    Tiskni na <strong>tvrdší papír</strong> (160–250 g/m²). Vystřihni po plné čáře. Přehni po čárkované. Chlopně nalep zevnitř.<br>
    Protilehlé stěny mají součet 7 (1+6, 2+5, 3+4).
</p>

<p class="color-label red">● Červený hráč — 3× D6</p>
<div class="dice-grid">
    <svg class="die-svg" viewBox="-1 -1 108 88" xmlns="http://www.w3.org/2000/svg"><use href="#d6-net" style="color:#bb2222"/></svg>
    <svg class="die-svg" viewBox="-1 -1 108 88" xmlns="http://www.w3.org/2000/svg"><use href="#d6-net" style="color:#bb2222"/></svg>
    <svg class="die-svg" viewBox="-1 -1 108 88" xmlns="http://www.w3.org/2000/svg"><use href="#d6-net" style="color:#bb2222"/></svg>
</div>

<div class="legend">
    <div class="legend-item">
        <svg width="16mm" height="3mm"><line x1="0" y1="1.5" x2="16" y2="1.5" stroke="#1a1008" stroke-width="0.6"/></svg>
        střih
    </div>
    <div class="legend-item">
        <svg width="16mm" height="3mm"><line x1="0" y1="1.5" x2="16" y2="1.5" stroke="#1a1008" stroke-width="0.4" stroke-dasharray="1.5,1"/></svg>
        přehyb
    </div>
    <div class="legend-item">
        <svg width="8mm" height="5mm"><polygon points="0,5 1,0 7,0 8,5" fill="#e8ddd0" stroke="#1a1008" stroke-width="0.3"/></svg>
        lepidlo
    </div>
</div>


<!-- ═══════ PAGE 2 — MODRÝ HRÁČ ═══════ -->
<div class="page-two">
    <p class="color-label blue">● Modrý hráč — 3× D6</p>
    <div class="dice-grid">
        <svg class="die-svg" viewBox="-1 -1 108 88" xmlns="http://www.w3.org/2000/svg"><use href="#d6-net" style="color:#2244aa"/></svg>
        <svg class="die-svg" viewBox="-1 -1 108 88" xmlns="http://www.w3.org/2000/svg"><use href="#d6-net" style="color:#2244aa"/></svg>
        <svg class="die-svg" viewBox="-1 -1 108 88" xmlns="http://www.w3.org/2000/svg"><use href="#d6-net" style="color:#2244aa"/></svg>
    </div>

    <div class="legend">
        <div class="legend-item">
            <svg width="16mm" height="3mm"><line x1="0" y1="1.5" x2="16" y2="1.5" stroke="#1a1008" stroke-width="0.6"/></svg>
            střih
        </div>
        <div class="legend-item">
            <svg width="16mm" height="3mm"><line x1="0" y1="1.5" x2="16" y2="1.5" stroke="#1a1008" stroke-width="0.4" stroke-dasharray="1.5,1"/></svg>
            přehyb
        </div>
        <div class="legend-item">
            <svg width="8mm" height="5mm"><polygon points="0,5 1,0 7,0 8,5" fill="#e8ddd0" stroke="#1a1008" stroke-width="0.3"/></svg>
            lepidlo
        </div>
    </div>
</div>

</body>
</html>
